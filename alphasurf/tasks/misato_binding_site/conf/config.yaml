defaults:
    - model_global_variables
    - blocks_zoo_small
    - blocks_zoo_input
    - blocks_zoo
    - encoder: gcn_gvpencoder
    - optimizer: adam
    - scheduler: reduce_lr_on_plateau
    - override hydra/job_logging: colorlog
    - override hydra/hydra_logging: colorlog
    - _self_

hydra:
    job:
        chdir: false
    searchpath:
        - file:///cluster/CBIO/data2/vgertner/alphasurf/alphasurf/alphasurf/tasks/shared_conf

seed: 5721
use_wandb: false
run_name: misato_binding_site
project_name: misato_binding_site
data_dir: /cluster/CBIO/data2/vgertner/alphasurf/alphasurf/data/misato
md_path: ${data_dir}/MD.hdf5
split_dir: ${data_dir}/splits
log_dir: ./
epochs: 50
device: 0
ckpt_path: null

# Training sees one uniformly sampled trajectory frame per complex and epoch.
# Validation/test are deterministic and always use the first trajectory frame.
train_frame_mode: random
eval_frame_mode: first
eval_frame_index: 0

# No trajectory-derived summary (adaptability/correlation) enters the model.
noise_sigma: 0.0

loader:
    num_workers: 8
    batch_size: 8
    pin_memory: false
    prefetch_factor: 2
    shuffle: true
    persistent_workers: true

train:
    save_top_k: 3
    early_stoping_patience: 15
    accumulate_grad_batches: 1
    val_check_interval: 1.0
    check_val_every_n_epoch: 1
    limit_train_batches: 1.0
    limit_val_batches: 1.0
    gradient_clip_val: 1.0
    log_every_n_steps: 25
    fast_dev_run: false
    to_monitor: auprc/val

cfg_surface:
    use_surfaces: true
    feat_keys: all
    oh_keys: all
    alpha_value: 0.0
    face_reduction_rate: 1.0
    max_vert_number: 100000
    min_vert_number: 16
    use_pymesh: false
    use_igl_normals: false
    use_poisson: false
    poisson_high_precision: true
    tufting: true

cfg_graph:
    use_graphs: true
    feat_keys: all
    oh_keys: all
    edge_cutoff: 12.0

cfg_head:
    encoded_dims: ${model_hdim}
    dropout: 0.1

encoder:
    pool_on: graph
